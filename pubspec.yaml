name: colow_flutter
description: "COLOW — sua seguranca em corridas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI / utilidades
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # State management + DI
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^8.0.3

  # Backend + auth
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Env / config
  flutter_dotenv: ^5.2.1

  # Localizacao
  geolocator: ^13.0.4

  # Mapas (Mapbox GL JS dentro de WebView — usa so o token publico pk)
  webview_flutter: ^4.10.0

  # Audio ao vivo
  livekit_client: ^2.5.0

  # Voz
  speech_to_text: ^7.0.0

  # Notificacoes + foreground service
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^19.2.0
  flutter_foreground_task: ^8.17.0

  # Permissoes / links / feedback
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  flutter_tts: ^4.2.2
  vibration: ^3.1.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  vosk_flutter_2:
    path: packages/vosk_flutter_2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/models/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Italic.ttf
          style: italic
          weight: 400
